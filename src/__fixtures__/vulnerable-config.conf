# Nginx-style TLS configuration with quantum-vulnerable settings

ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:AES256-GCM-SHA384;

# SSH-style configuration
HostKeyAlgorithms ssh-rsa,ecdsa-sha2-nistp256,ssh-ed25519
KexAlgorithms diffie-hellman-group14-sha256,ecdh-sha2-nistp256
PubkeyAcceptedAlgorithms ssh-rsa

# Kubernetes-style TLS secret
type: kubernetes.io/tls
secretName: my-app-tls
tls.crt: base64-encoded-cert
tls.key: base64-encoded-key

# cert-manager RSA key
privateKey:
  algorithm: RSA
  size: 2048

# TLS cipher suites (explicit RSA key exchange — no forward secrecy)
TLS_RSA_WITH_AES_128_CBC_SHA
